<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>阅读 - 711故事屋</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .reader-page { 
      min-height: 100vh; 
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding-bottom: 100px; 
    }
    
    .reader-header { 
      display: flex; 
      align-items: center; 
      padding: 16px 20px; 
      gap: 12px;
      position: sticky;
      top: 0;
      background: rgba(26,26,46,0.8);
      backdrop-filter: blur(20px);
      z-index: 10;
    }
    
    .back-btn { 
      font-size: 24px; 
      cursor: pointer; 
      text-decoration: none; 
      color: #fff;
      padding: 8px;
      border-radius: 12px;
      transition: all 0.3s;
    }
    
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .reader-title { 
      font-size: 18px; 
      font-weight: 700; 
      color: #fff; 
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .personal-card { 
      margin: 0 20px 16px; 
      padding: 20px; 
      border-radius: 20px; 
      color: #fff; 
      line-height: 1.8; 
      font-size: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .opening-card { 
      background: linear-gradient(135deg, rgba(102,126,234,0.8) 0%, rgba(118,75,162,0.8) 100%);
    }
    
    .ending-card { 
      background: linear-gradient(135deg, rgba(255,107,107,0.8) 0%, rgba(255,142,83,0.8) 100%);
    }

    .story-content { 
      margin: 0 20px; 
      background: rgba(255,255,255,0.95); 
      border-radius: 24px; 
      padding: 28px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .story-text { 
      font-size: 17px; 
      line-height: 2; 
      color: #1a1a2e; 
      white-space: pre-line; 
    }

    .control-bar { 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0; 
      background: rgba(255,255,255,0.95); 
      backdrop-filter: blur(20px); 
      padding: 12px 20px; 
      padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
      display: flex; 
      justify-content: space-around; 
      border-top: 1px solid rgba(0,0,0,0.05); 
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    }
    
    .ctrl-btn { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 4px; 
      background: none; 
      border: none; 
      cursor: pointer; 
      font-size: 24px; 
      color: #636e72; 
      padding: 8px 16px;
      border-radius: 12px;
      transition: all 0.3s;
    }
    
    .ctrl-btn:hover {
      background: rgba(102,126,234,0.1);
    }
    
    .ctrl-label { 
      font-size: 11px; 
      color: #636e72;
      font-weight: 500;
    }
    
    .ctrl-btn.active { 
      color: #FF6B6B; 
    }
    
    .ctrl-btn.active .ctrl-label { 
      color: #FF6B6B; 
    }

    .loading-state { 
      text-align: center; 
      padding: 100px 20px; 
      color: rgba(255,255,255,0.7);
      font-size: 15px;
    }
    
    .loading-state .spinner {
      font-size: 48px;
      animation: spin 2s linear infinite;
      display: block;
      margin-bottom: 16px;
    }
    
    @keyframes spin { 
      100% { transform: rotate(360deg); } 
    }

    /* 音色选择面板 */
    .voice-panel { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,0.6); 
      z-index: 200;
      backdrop-filter: blur(5px);
    }
    
    .voice-panel.show { 
      display: flex; 
      align-items: flex-end; 
    }
    
    .voice-sheet { 
      background: rgba(255,255,255,0.98); 
      border-radius: 24px 24px 0 0; 
      width: 100%; 
      max-height: 70vh; 
      overflow-y: auto; 
      padding: 24px; 
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
    }
    
    .voice-sheet-title { 
      font-size: 18px; 
      font-weight: 700; 
      margin-bottom: 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      color: #1a1a2e;
    }
    
    .voice-sheet-close { 
      font-size: 24px; 
      cursor: pointer; 
      color: #999; 
      background: none; 
      border: none;
      padding: 4px;
    }
    
    .voice-item { 
      padding: 16px; 
      border-radius: 16px; 
      margin-bottom: 8px; 
      cursor: pointer; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      transition: all 0.3s;
      background: #f8f9fa;
    }
    
    .voice-item:hover { 
      background: rgba(102,126,234,0.1);
    }
    
    .voice-item.selected { 
      background: rgba(255,107,107,0.1);
      border: 2px solid #FF6B6B;
    }
    
    .voice-item .vname { 
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
    }
    
    .voice-item .vdesc {
      font-size: 12px;
      color: #636e72;
      margin-top: 4px;
    }
    
    .voice-item .vcheck { 
      font-size: 20px;
      color: #FF6B6B;
    }
    
    .edge-tip {
      padding: 16px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
      border-radius: 16px;
      font-size: 13px;
      color: #667eea;
      border: 1px solid rgba(102,126,234,0.2);
    }
    
    .recommend-badge {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="reader-page">
    <div class="reader-header">
      <a class="back-btn" onclick="history.back()">←</a>
      <div class="reader-title" id="titleText"></div>
    </div>

    <div class="personal-card opening-card" id="openingCard"></div>

    <div class="story-content">
      <div class="story-text" id="storyText"></div>
    </div>

    <div class="personal-card ending-card" id="endingCard" style="display:none"></div>

    <div class="loading-state" id="loadingState">
      <span class="spinner">✨</span>
      <div>正在加载故事...</div>
    </div>

    <div class="control-bar">
      <button class="ctrl-btn" id="playBtn" onclick="toggleRead()">
        <span id="playIcon">▶</span>
        <span class="ctrl-label" id="playLabel">朗读</span>
      </button>
      <button class="ctrl-btn" onclick="showVoicePanel()">
        <span>🎵</span>
        <span class="ctrl-label">音色</span>
      </button>
      <button class="ctrl-btn" id="favBtn" onclick="toggleFav()">
        <span id="favIcon">☆</span>
        <span class="ctrl-label">收藏</span>
      </button>
      <button class="ctrl-btn" onclick="shareStory()">
        <span>📤</span>
        <span class="ctrl-label">分享</span>
      </button>
    </div>
  </div>

  <!-- 音色选择面板 -->
  <div class="voice-panel" id="voicePanel" onclick="if(event.target===this)hideVoicePanel()">
    <div class="voice-sheet">
      <div class="voice-sheet-title">
        <span>🎵 选择音色</span>
        <button class="voice-sheet-close" onclick="hideVoicePanel()">✕</button>
      </div>
      <div id="voiceList"></div>
    </div>
  </div>

  <script src="js/utils.js?v=4"></script>
  <script src="js/storage.js?v=4"></script>
  <script>
    // === INLINED personalize.js (fixed grammar) ===
    const Personalize = {
      categoryNames: {
        bedtime: '睡前', fairy: '童话', fable: '寓言', idiom: '成语',
        aesop: '寓言', grimm: '童话', andersen: '童话'
      },
      generateOpening(child, story) {
        if (!child) return '';
        const vars = this._buildVars(child, story);
        const categorySuffix = ['睡前', '童话', '寓言', '成语'].includes(vars.category) ? '' : '故事';
        return `亲爱的${vars.name}小朋友，今天${vars.timeGreeting}，要给你讲的是一个关于${vars.topic}的${vars.category}${categorySuffix}，故事的名字叫《${vars.title}》。准备好了吗？让我们一起来听吧！`;
      },
      generateEnding(child, story) {
        if (!child) return '';
        const vars = this._buildVars(child, story);
        return `故事讲完啦！这个故事告诉我们${vars.moral}。希望${vars.name}小朋友也能像故事里那样${vars.wish}。好啦，闭上小眼睛，做个甜甜的美梦吧。${vars.name}，晚安！🌙`;
      },
      _buildVars(child, story) {
        return {
          name: child.name || '小朋友',
          pronoun: child.gender === 'female' ? '她' : '他',
          timeGreeting: getTimeGreeting(),
          category: this.categoryNames[story.category] || story.category || '故事',
          topic: story.topic || '有趣',
          title: story.title || '',
          moral: story.moral || '要做一个好孩子',
          wish: story.wish || '健康快乐地成长'
        };
      }
    };
  </script>
  <script src="js/story-data.js?v=4"></script>
  <script>
    let story = null;
    let child = null;
    let isFav = false;
    let isPlaying = false;
    let storySource = 'library';
    let selectedVoice = null;
    let availableVoices = [];

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      storySource = params.get('source') || 'library';
      const storyId = params.get('storyId');

      const allChildren = ChildStore.getAll();
      child = ChildStore.getDefault() || allChildren[0] || null;

      if (storySource === 'ai' && storyId) {
        story = StoryStore.get(storyId);
        if (story && story.childId) {
          child = ChildStore.get(story.childId) || child;
        }
      } else if (storySource === 'library') {
        story = StoryData.getById(id);
      }

      if (!story) {
        document.getElementById('loadingState').innerHTML = '<div style="font-size:48px;margin-bottom:16px">📖</div>故事未找到';
        return;
      }

      document.getElementById('loadingState').style.display = 'none';
      renderStory();
      initVoices();
    }

    function renderStory() {
      document.getElementById('titleText').textContent = story.title;

      // 个性化开头
      if (child) {
        let openingText;
        if (storySource === 'ai') {
          openingText = `亲爱的${child.name}，今晚的故事是专门为你准备的哦！在这个故事里，${child.name}是最厉害的小主角！准备好了吗？故事要开始啦！`;
        } else {
          openingText = Personalize.generateOpening(child, story);
        }
        document.getElementById('openingCard').textContent = openingText;
      } else {
        document.getElementById('openingCard').style.display = 'none';
      }

      // 整篇展示
      document.getElementById('storyText').textContent = story.content || '';

      // 结尾
      if (child) {
        let endingText;
        if (storySource === 'ai') {
          const tip = story.tip || '🌟 每个孩子都是独一无二的';
          endingText = `今天${child.name}的冒险结束啦！${tip}。${child.name}小朋友真棒！现在闭上眼睛，让星星守护你的梦乡。晚安，${child.name}！💫`;
        } else {
          endingText = Personalize.generateEnding(child, story);
        }
        document.getElementById('endingCard').textContent = endingText;
        document.getElementById('endingCard').style.display = 'block';
      }

      // 收藏状态
      const storyOrigId = story.originalId || story.id;
      const history = StoryStore.getAll();
      const saved = history.find(h => h.originalId === storyOrigId || h.id === storyOrigId);
      isFav = saved ? saved.favorite : (story.favorite || false);
      updateFavIcon();

      // 记录历史
      if (storySource === 'library') {
        StoryStore.addToHistory({ originalId: story.id, title: story.title, emoji: story.emoji, category: story.category });
      } else if (storySource === 'ai') {
        StoryStore.update(story.id, { lastPlayedAt: Date.now(), listenCount: (story.listenCount || 0) + 1 });
      }
    }

    // 推荐音色配置
    const RECOMMENDED_VOICES = [
      { name: "Microsoft Xiaoyi Online (Natural)", displayName: "晓伊", description: "温柔亲切，像幼儿园老师", isDefault: true },
      { name: "Microsoft Xiaoxiao Online (Natural)", displayName: "晓晓", description: "情绪表现力强，像大姐姐" },
      { name: "Microsoft Yunxi Online (Natural)", displayName: "云希", description: "沉稳爸爸声，安全感强" }
    ];

    function isEdgeBrowser() {
      return navigator.userAgent.includes('Edg') && !navigator.userAgent.includes('OPR');
    }

    function initVoices() {
      const loadVoices = () => {
        const allVoices = speechSynthesis.getVoices();
        
        for (const rec of RECOMMENDED_VOICES) {
          const found = allVoices.find(v => v.name === rec.name);
          if (found) {
            selectedVoice = found;
            break;
          }
        }
        
        if (!selectedVoice) {
          availableVoices = allVoices.filter(v => v.lang && v.lang.startsWith('zh'));
          if (availableVoices.length > 0) {
            selectedVoice = availableVoices[0];
          }
        }
        
        if (!selectedVoice) {
          availableVoices = allVoices;
          selectedVoice = availableVoices[0] || null;
        }
      };
      
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    function showVoicePanel() {
      const list = document.getElementById('voiceList');
      const isEdge = isEdgeBrowser();
      
      if (availableVoices.length === 0) {
        list.innerHTML = `
          <div style="padding:40px;text-align:center;color:#999">
            <div style="font-size:48px;margin-bottom:16px">🎙️</div>
            <div style="font-weight:600;margin-bottom:8px;color:#1a1a2e">暂无可用音色</div>
            <div style="font-size:13px;color:#636e72;margin-bottom:20px">
              推荐使用 <b>Microsoft Edge</b> 浏览器<br>
              可获得晓伊、晓晓、云希三款哄娃音色
            </div>
          </div>`;
      } else {
        const voicesHtml = availableVoices.map((v, i) => {
          const rec = RECOMMENDED_VOICES.find(r => r.name === v.name);
          const isRecommended = !!rec;
          const displayName = rec ? rec.displayName : v.name;
          const desc = rec ? rec.description : (v.lang || '未知语言');
          
          return `<div class="voice-item ${selectedVoice && selectedVoice.name === v.name ? 'selected' : ''}" onclick="pickVoice(${i})">
            <div>
              <div class="vname">${displayName}${isRecommended ? '<span class="recommend-badge">推荐</span>' : ''}</div>
              <div class="vdesc">${desc}</div>
            </div>
            <span class="vcheck">${selectedVoice && selectedVoice.name === v.name ? '✓' : ''}</span>
          </div>`;
        }).join('');
        
        const edgeTip = isEdge ? '' : `
          <div class="edge-tip">
            💡 <b>提示：</b>使用 Microsoft Edge 浏览器可获得晓伊、晓晓、云希等更高质量的哄娃音色
          </div>`;
        
        list.innerHTML = edgeTip + voicesHtml;
      }
      document.getElementById('voicePanel').classList.add('show');
    }

    function hideVoicePanel() {
      document.getElementById('voicePanel').classList.remove('show');
    }

    function pickVoice(idx) {
      selectedVoice = availableVoices[idx];
      Settings.set('voiceName', selectedVoice.name);
      hideVoicePanel();
    }

    // Web Speech API 朗读
    let currentUtterance = null;
    let isCancelled = false;
    
    function toggleRead() {
      if (isPlaying) {
        isCancelled = true;
        speechSynthesis.cancel();
        isPlaying = false;
        document.getElementById('playIcon').textContent = '▶';
        document.getElementById('playLabel').textContent = '朗读';
        return;
      }
      
      if (!window.speechSynthesis) {
        alert('您的浏览器不支持朗读功能，请使用 Edge 或 Chrome 浏览器');
        return;
      }
      
      speechSynthesis.cancel();
      isCancelled = false;
      
      let text = '';
      if (child) {
        if (storySource === 'ai') {
          text += `亲爱的${child.name}，今晚的故事是专门为你准备的哦！准备好了吗？故事要开始啦！`;
        } else {
          text += Personalize.generateOpening(child, story);
        }
        text += '。';
      }
      text += story.content || '';
      if (child) {
        if (storySource === 'ai') {
          const tip = story.tip || '每个孩子都是独一无二的';
          text += `。今天${child.name}的冒险结束啦！${tip}。${child.name}小朋友真棒！晚安！`;
        } else {
          text += '。' + Personalize.generateEnding(child, story);
        }
      }

      text = text.replace(/\n+/g, '。').replace(/。+/g, '。').replace(/^\s+|\s+$/g, '');
      if (!text) {
        alert('没有可朗读的内容');
        return;
      }

      currentUtterance = new SpeechSynthesisUtterance(text);
      currentUtterance.lang = 'zh-CN';
      currentUtterance.rate = 0.8;
      currentUtterance.pitch = 0.9;
      if (selectedVoice) currentUtterance.voice = selectedVoice;
      
      currentUtterance.onstart = () => {
        isPlaying = true;
        document.getElementById('playIcon').textContent = '⏸';
        document.getElementById('playLabel').textContent = '暂停';
      };
      
      currentUtterance.onend = () => { 
        isPlaying = false; 
        currentUtterance = null;
        document.getElementById('playIcon').textContent = '▶'; 
        document.getElementById('playLabel').textContent = '朗读';
      };
      
      currentUtterance.onerror = (e) => { 
        if (isCancelled || e.error === 'canceled' || e.error === 'interrupted') {
          isCancelled = false;
          return;
        }
        isPlaying = false; 
        currentUtterance = null;
        document.getElementById('playIcon').textContent = '▶'; 
        document.getElementById('playLabel').textContent = '朗读';
      };
      
      setTimeout(() => {
        try {
          speechSynthesis.speak(currentUtterance);
        } catch(err) {
          alert('启动朗读失败，请使用 Edge 浏览器获得最佳体验');
        }
      }, 100);
    }

    function toggleFav() {
      isFav = !isFav;
      const storyOrigId = story.originalId || story.id;
      if (storySource === 'ai') {
        StoryStore.update(story.id, { favorite: isFav });
      } else {
        StoryStore.setFavorite(storyOrigId, isFav);
      }
      updateFavIcon();
    }
    
    function updateFavIcon() {
      document.getElementById('favIcon').textContent = isFav ? '⭐' : '☆';
      document.getElementById('favBtn').classList.toggle('active', isFav);
    }

    function shareStory() {
      if (navigator.share) {
        navigator.share({ title: story.title, text: `来听711故事屋的《${story.title}》`, url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => alert('链接已复制！'));
      }
    }

    init();
  </script>
</body>
</html>
