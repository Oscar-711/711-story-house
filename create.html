<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI创作 - 711故事屋</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .page-header {
      text-align: center;
      padding: 24px 0 16px;
      color: #fff;
    }
    
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    
    .page-header p {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 4px;
    }

    .section { 
      margin-bottom: 24px; 
      padding: 0 20px;
    }
    
    .section-label { 
      font-size: 15px; 
      font-weight: 600; 
      color: rgba(255,255,255,0.9); 
      margin-bottom: 12px; 
      display: flex; 
      align-items: center; 
      gap: 8px; 
    }

    /* 孩子选择 */
    .child-list { 
      display: flex; 
      gap: 10px; 
      overflow-x: auto; 
      padding: 4px 0 8px;
      scrollbar-width: none;
    }
    
    .child-list::-webkit-scrollbar { display: none; }
    
    .child-chip { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      padding: 12px 18px; 
      border-radius: 20px; 
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      cursor: pointer; 
      white-space: nowrap; 
      border: 2px solid transparent; 
      transition: all 0.3s;
      flex-shrink: 0;
      color: rgba(255,255,255,0.9);
    }
    
    .child-chip.selected { 
      border-color: #FF6B6B;
      background: rgba(255,107,107,0.2);
    }
    
    .child-chip .avatar { 
      font-size: 24px; 
    }
    
    .child-chip .cname { 
      font-size: 14px; 
      font-weight: 600;
    }
    
    .no-child-card { 
      background: rgba(255,255,255,0.95);
      border-radius: 20px; 
      padding: 32px; 
      text-align: center; 
      color: #636e72;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .no-child-card a { 
      color: #FF6B6B;
      text-decoration: none;
      font-weight: 600;
    }

    /* 故事类型网格 */
    .type-grid { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 10px; 
    }
    
    .type-item { 
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px; 
      padding: 16px 8px; 
      text-align: center; 
      cursor: pointer; 
      border: 2px solid transparent; 
      transition: all 0.3s;
      color: rgba(255,255,255,0.9);
    }
    
    .type-item.selected { 
      border-color: #FF6B6B;
      background: rgba(255,107,107,0.2);
      box-shadow: 0 4px 15px rgba(255,107,107,0.2);
    }
    
    .type-item .temoji { 
      font-size: 28px; 
      display: block; 
      margin-bottom: 6px; 
    }
    
    .type-item .tname { 
      font-size: 12px;
      font-weight: 500;
    }

    /* 自定义输入 */
    .custom-input { 
      display: none; 
      margin-top: 12px; 
    }
    
    .custom-input.show { 
      display: block; 
    }
    
    .custom-input textarea { 
      width: 100%; 
      padding: 16px; 
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px; 
      font-size: 15px; 
      resize: none; 
      height: 80px; 
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: #fff;
      box-sizing: border-box;
    }
    
    .custom-input textarea::placeholder {
      color: rgba(255,255,255,0.5);
    }
    
    .custom-input textarea:focus {
      outline: none;
      border-color: #FF6B6B;
    }

    /* 篇幅选择 */
    .length-row { 
      display: flex; 
      gap: 10px; 
    }
    
    .length-item { 
      flex: 1; 
      padding: 14px 8px; 
      border-radius: 16px; 
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      text-align: center; 
      cursor: pointer; 
      border: 2px solid transparent; 
      transition: all 0.3s;
      color: rgba(255,255,255,0.9);
    }
    
    .length-item.selected { 
      border-color: #FF6B6B;
      background: rgba(255,107,107,0.2);
    }
    
    .length-item .lname { 
      font-size: 14px; 
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    
    .length-item .ldesc { 
      font-size: 11px; 
      opacity: 0.8;
    }

    /* 按钮区 */
    .btn-row { 
      display: flex; 
      gap: 12px; 
      margin-top: 32px;
      padding: 0 20px;
    }
    
    .gen-btn { 
      flex: 1; 
      padding: 16px; 
      border: none; 
      border-radius: 16px; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s;
    }
    
    .gen-btn-text { 
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255,107,107,0.3);
    }
    
    .gen-btn-text:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,107,107,0.4);
    }
    
    .gen-btn-pic { 
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .gen-btn:disabled { 
      opacity: .5; 
      cursor: default; 
    }
    
    .coming-tag { 
      font-size: 10px; 
      background: rgba(255,255,255,.2); 
      padding: 2px 8px; 
      border-radius: 10px; 
      margin-left: 4px; 
    }

    /* 功能预告卡片 */
    .feature-preview {
      margin: 20px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }
    
    .feature-preview h3 {
      color: #fff;
      font-size: 15px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .feature-preview p {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      line-height: 1.6;
    }

    /* 加载遮罩 */
    .loading-mask { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,.7); 
      z-index: 300; 
      justify-content: center; 
      align-items: center;
      backdrop-filter: blur(5px);
    }
    
    .loading-mask.show { 
      display: flex; 
    }
    
    .loading-box { 
      background: rgba(255,255,255,0.95);
      border-radius: 24px; 
      padding: 48px 40px; 
      text-align: center; 
      max-width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .loading-box .spinner { 
      font-size: 56px; 
      animation: spin 2s linear infinite; 
      display: inline-block; 
    }
    
    @keyframes spin { 
      100% { transform: rotate(360deg); } 
    }
    
    .loading-box .ltxt { 
      margin-top: 20px; 
      font-size: 16px; 
      color: #1a1a2e;
      font-weight: 500;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>✨ AI创作</h1>
      <p>为宝贝创作专属睡前故事</p>
    </div>

    <!-- 选择孩子 -->
    <div class="section">
      <div class="section-label">👶 选择宝贝</div>
      <div id="childArea"></div>
    </div>

    <!-- 故事类型 -->
    <div class="section">
      <div class="section-label">📚 故事类型</div>
      <div class="type-grid" id="typeGrid"></div>
      <div class="custom-input" id="customInput">
        <textarea id="customPrompt" placeholder="比如：教孩子学会分享、不怕黑..."></textarea>
      </div>
    </div>

    <!-- 篇幅 -->
    <div class="section">
      <div class="section-label">📏 故事篇幅</div>
      <div class="length-row" id="lengthRow"></div>
    </div>

    <!-- 按钮 -->
    <div class="btn-row">
      <button class="gen-btn gen-btn-text" id="genTextBtn" onclick="doGenerate()">📝 生成故事</button>
      <button class="gen-btn gen-btn-pic" disabled>🎨 AI绘本<span class="coming-tag">即将上线</span></button>
    </div>
    
    <!-- 功能预告 -->
    <div class="feature-preview">
      <h3>🎨 AI绘本功能预告</h3>
      <p>以宝贝名字和形象为主角，生成精美绘本故事！支持自定义类型、情节、场景等关键要素，每个故事配有多张精美插画。</p>
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div class="loading-mask" id="loadingMask">
    <div class="loading-box">
      <div class="spinner">✨</div>
      <div class="ltxt" id="loadingText">AI正在编织故事...</div>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.html"><span class="icon">🏠</span>首页</a>
    <a href="library.html"><span class="icon">📚</span>故事库</a>
    <a href="create.html" class="active"><span class="icon">✨</span>AI创作</a>
    <a href="profile.html"><span class="icon">👤</span>我的</a>
  </nav>

  <script src="js/utils.js?v=4"></script>

  <script>
// === INLINED story-ai.js v4.0 (bypass CDN cache) ===
const API_CONFIG = {
  storyUrl: 'https://api.stepfun.com/v1/chat/completions',
  apiKey: '4oS7T7XAKtsj9jA21J0ThpPqbU6UXmVmFeLdEOLLNGpaiGrcHi9Mym5aRNtWnHiix'
};

const StoryAI = {
  API_URL: API_CONFIG.storyUrl,
  API_KEY: API_CONFIG.apiKey,
  MODEL: 'step-3.5-flash',
  
  lengthConfig: {
    short:  { wordCount: 300,  pageCount: 2, desc: '短篇' },
    medium: { wordCount: 600,  pageCount: 4, desc: '中篇' },
    long:   { wordCount: 1000, pageCount: 6, desc: '长篇' },
    extra:  { wordCount: 1500, pageCount: 8, desc: '超长篇' }
  },
  
  typeDesc: {
    fairy: '童话故事', fable: '寓言故事', myth: '神话传说',
    animal: '动物故事', scifi: '科幻冒险', science: '科学探索',
    princess: '公主故事', ocean: '海洋冒险', fantasy: '奇幻冒险',
    habit: '好习惯养成', friendship: '友情故事', courage: '勇气故事',
    custom: '自定义'
  },
  
  safetyGuidelines: '禁止恐怖、焦虑、不当示范、危险行为、复杂负面情绪内容。用温馨安全的方式替代。',
  
  getCognitiveElements(age) {
    if (age <= 3) return '融入基础认知：数数(1-5)、基本颜色、简单形状。句子简短(10字以内)，多用叠词和拟声词';
    if (age <= 4) return '融入基础认知：数数(1-10)、颜色、形状、常见动物。句子简短，适当重复';
    if (age <= 6) return '融入社交认知：情感词汇(开心/难过/骄傲)、社交概念(分享/轮流/说请和谢谢)';
    return '融入成长认知：简单逻辑推理、因果关系、友谊与合作的深层意义';
  },
  
  getLanguageStyle(age) {
    if (age <= 3) return '语言风格：句子极短(5-10字)，节奏重复，多用叠词和拟声词';
    if (age <= 4) return '语言风格：句子简短(10-15字)，节奏舒缓，多用拟声词';
    return '语言风格：优美生动，适当使用形容词，情节完整有起伏';
  },
  
  async generateStory(opts) {
    try { return await this._doGenerate(opts); }
    catch(e) {
      if (window.location.protocol === 'file:') return this._getMockStory(opts.childName, opts.childAge, opts.childGender, opts.storyType);
      throw e;
    }
  },
  
  _getMockStory(childName, childAge, childGender, storyType) {
    return {
      title: childName + '的奇妙冒险',
      pages: [
        { text: '从前，在一个美丽的彩虹山谷里，住着一个叫' + childName + '的小朋友。一天早晨，' + childName + '发现家门口多了一扇神奇的小门。', scene: '彩虹山谷' },
        { text: childName + '推开门，发现了一个奇妙的花园！会说话的花朵、跳舞的蝴蝶。太阳下山了，' + childName + '带着星星种子回到家，做了一个甜甜的梦。', scene: '梦想花园' }
      ],
      tip: '勇敢不是不害怕，而是即使害怕也愿意尝试',
      moral: '善良和勇敢能让世界变得更美好',
      wish: childName + '能永远保持善良和勇敢的心'
    };
  },
  
  async _doGenerate({ childName, childAge, childGender, storyType, customPrompt, length }) {
    const cfg = this.lengthConfig[length] || this.lengthConfig.medium;
    const genderDesc = childGender === 'girl' ? '女孩' : '男孩';
    const pronoun = childGender === 'girl' ? '她' : '他';
    let typeDesc = this.typeDesc[storyType] || '童话故事';
    if (storyType === 'custom' && customPrompt) typeDesc = '关于"' + customPrompt + '"的定制故事';
    
    const scenes = ['魔法森林', '彩虹山谷', '星星湖畔', '云朵城堡', '糖果小镇', '水晶海底'];
    const scene = scenes[Math.floor(Math.random() * scenes.length)];
    
    const prompt = '你是一位专业的儿童睡前故事作家。请为一个叫"' + childName + '"的' + childAge + '岁' + genderDesc + '创作一个睡前故事。主角：' + childName + '（' + genderDesc + '），场景：' + scene + '，类型：' + typeDesc + '，字数：约' + cfg.wordCount + '字，分成' + cfg.pageCount + '个自然段落。风格温馨优美，适当使用拟声词。' + this.getCognitiveElements(childAge) + ' ' + this.getLanguageStyle(childAge) + ' ' + this.safetyGuidelines + ' 请按以下JSON格式输出（只输出JSON）：{"title":"故事标题（包含' + childName + '）","pages":[{"text":"段落内容","scene":"场景画面描述"}],"tip":"给' + childName + '的成长小贴士","moral":"核心道理（一句话）","wish":"对' + childName + '的温馨祝愿"}';
    
    const res = await fetch(this.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.API_KEY },
      body: JSON.stringify({
        model: this.MODEL,
        max_tokens: 4096,
        temperature: 0.8,
        response_format: { type: 'json_object' },
        messages: [
          { role: 'system', content: '你是一个专业的儿童睡前故事创作助手。请始终用中文回复，输出合法的JSON格式，不要输出任何非JSON内容。' },
          { role: 'user', content: prompt }
        ]
      })
    });
    
    if (!res.ok) { const err = await res.text(); throw new Error('API请求失败: ' + res.status); }
    
    const data = await res.json();
    let content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || '';
    
    // 清理和修复 JSON
    content = content.trim();
    // 移除可能的 markdown 代码块
    content = content.replace(/^```json\s*/i, '').replace(/```\s*$/i, '');
    content = content.replace(/^```\s*/i, '').replace(/```\s*$/i, '');
    
    // 尝试解析 JSON
    try {
      return JSON.parse(content);
    } catch (parseErr) {
      console.error('JSON解析失败，尝试修复:', parseErr);
      // 尝试修复常见的 JSON 错误
      // 1. 修复未加引号的属性名
      content = content.replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g, '$1"$2":');
      // 2. 修复单引号
      content = content.replace(/'/g, '"');
      // 3. 修复多余的逗号
      content = content.replace(/,\s*([}\]])/g, '$1');
      // 4. 修复缺失的引号（简单情况）
      content = content.replace(/:([a-zA-Z\u4e00-\u9fa5][^,}\]]*)/g, ':"$1"');
      
      try {
        return JSON.parse(content);
      } catch (fixErr) {
        console.error('JSON修复后仍失败:', fixErr);
        throw new Error('AI返回的内容格式不正确，请重试');
      }
    }
  }
};
// === END INLINED ===
  </script>
  <script src="js/app.js?v=4"></script>
  <script>
    // State
    let selectedChildId = null;
    let selectedType = 'fairy';
    let selectedLength = 'medium';

    const storyTypes = [
      { key: 'fairy', emoji: '🧚', name: '童话' },
      { key: 'fable', emoji: '📖', name: '寓言' },
      { key: 'myth', emoji: '🐉', name: '神话' },
      { key: 'animal', emoji: '🐾', name: '动物' },
      { key: 'scifi', emoji: '🚀', name: '科幻' },
      { key: 'science', emoji: '🔬', name: '科学' },
      { key: 'princess', emoji: '👑', name: '公主' },
      { key: 'ocean', emoji: '🌊', name: '海洋' },
      { key: 'fantasy', emoji: '✨', name: '奇幻' },
      { key: 'habit', emoji: '🏠', name: '习惯' },
      { key: 'friendship', emoji: '🤝', name: '友情' },
      { key: 'courage', emoji: '💪', name: '勇气' },
      { key: 'custom', emoji: '📝', name: '自定义' }
    ];

    const lengths = [
      { key: 'short', name: '短篇', desc: '300字' },
      { key: 'medium', name: '中篇', desc: '600字' },
      { key: 'long', name: '长篇', desc: '1000字' },
      { key: 'extra', name: '超长篇', desc: '1500字' }
    ];

    function initPage() {
      // Children
      const children = ChildStore.getAll();
      const area = document.getElementById('childArea');
      if (children.length === 0) {
        area.innerHTML = '<div class="no-child-card">还没有宝贝档案哦～<br><a href="profile.html">请先添加宝贝档案</a></div>';
        document.getElementById('genTextBtn').disabled = true;
      } else {
        selectedChildId = (ChildStore.getDefault() || children[0]).id;
        area.innerHTML = '<div class="child-list">' + children.map(c =>
          `<div class="child-chip ${c.id === selectedChildId ? 'selected' : ''}" onclick="selectChild('${c.id}')">
            <span class="avatar">${getGenderEmoji(c.gender)}</span>
            <span class="cname">${c.name}</span>
          </div>`
        ).join('') + '</div>';
      }

      // Types
      document.getElementById('typeGrid').innerHTML = storyTypes.map(t =>
        `<div class="type-item ${t.key === selectedType ? 'selected' : ''}" onclick="selectType('${t.key}')">
          <span class="temoji">${t.emoji}</span>
          <span class="tname">${t.name}</span>
        </div>`
      ).join('');

      // Lengths
      document.getElementById('lengthRow').innerHTML = lengths.map(l =>
        `<div class="length-item ${l.key === selectedLength ? 'selected' : ''}" onclick="selectLength('${l.key}')">
          <span class="lname">${l.name}</span>
          <span class="ldesc">${l.desc}</span>
        </div>`
      ).join('');
    }

    function selectChild(id) {
      selectedChildId = id;
      document.querySelectorAll('.child-chip').forEach(el => {
        const isSelected = el.getAttribute('onclick').includes(id);
        el.classList.toggle('selected', isSelected);
      });
    }

    function selectType(key) {
      selectedType = key;
      document.querySelectorAll('.type-item').forEach(el => el.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('customInput').classList.toggle('show', key === 'custom');
    }

    function selectLength(key) {
      selectedLength = key;
      document.querySelectorAll('.length-item').forEach(el => el.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }

    async function doGenerate() {
      const child = ChildStore.get(selectedChildId);
      if (!child) { alert('请先选择宝贝'); return; }

      const customPrompt = document.getElementById('customPrompt').value.trim();
      if (selectedType === 'custom' && !customPrompt) { alert('请输入自定义故事主题'); return; }

      // Show loading
      document.getElementById('loadingText').textContent = `AI正在为${child.name}编织故事... ✨`;
      document.getElementById('loadingMask').classList.add('show');

      try {
        const result = await StoryAI.generateStory({
          childName: child.name,
          childAge: child.age || 5,
          childGender: child.gender,
          storyType: selectedType,
          customPrompt,
          length: selectedLength
        });

        // Save to StoryStore
        const saved = StoryStore.add({
          source: 'ai',
          title: result.title,
          emoji: storyTypes.find(t => t.key === selectedType)?.emoji || '✨',
          category: selectedType,
          childId: child.id,
          childName: child.name,
          pages: result.pages,
          tip: result.tip || '',
          moral: result.moral || '',
          wish: result.wish || '',
          content: result.pages.map(p => p.text).join('\n\n')
        });

        // Navigate to reader
        window.location.href = `reader.html?source=ai&storyId=${saved.id}`;
      } catch(e) {
        console.error(e);
        alert('生成失败：' + e.message);
      } finally {
        document.getElementById('loadingMask').classList.remove('show');
      }
    }

    initPage();
  </script>
</body>
</html>
