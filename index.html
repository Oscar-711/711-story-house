<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>711故事屋 - 宝贝的专属睡前故事</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="用AI为宝贝创作专属睡前故事">
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* 首页特有样式 */
    .hero-section {
      text-align: center;
      padding: 40px 0 32px;
      color: #fff;
    }
    
    .hero-illustration {
      font-size: 80px;
      margin-bottom: 16px;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .hero-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .hero-subtitle {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    
    .hero-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      box-shadow: 0 4px 15px rgba(255,107,107,0.4);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin: 24px 0;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
    }
    
    .stats-item {
      text-align: center;
    }
    
    .stats-item .number {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      display: block;
    }
    
    /* 分类标签 */
    .category-tags {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 0 16px;
      margin: 0 -4px;
      scrollbar-width: none;
    }
    
    .category-tags::-webkit-scrollbar {
      display: none;
    }
    
    .category-tag {
      flex-shrink: 0;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    
    .category-tag:hover,
    .category-tag.active {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    
    .category-tag .emoji {
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Hero Section -->
    <div class="hero-section">
      <div class="hero-illustration">🏰✨🌙</div>
      <h1 class="hero-title">711故事屋</h1>
      <p class="hero-subtitle">今晚，给宝贝讲个专属故事吧</p>
      
      <div class="hero-cta">
        <a href="create.html" class="btn btn-primary">✨ 创作AI故事</a>
        <a href="library.html" class="btn btn-secondary">📚 浏览故事库</a>
      </div>
      
      <div class="stats-bar">
        <div class="stats-item">
          <span class="number">49+</span>
          <span>经典故事</span>
        </div>
        <div class="stats-item">
          <span class="number">∞</span>
          <span>AI创作</span>
        </div>
        <div class="stats-item">
          <span class="number">0</span>
          <span>元/个</span>
        </div>
      </div>
    </div>
    
    <!-- 分类标签 -->
    <div class="category-tags">
      <a href="library.html" class="category-tag active"><span class="emoji">✨</span>全部</a>
      <a href="library.html?category=bedtime" class="category-tag"><span class="emoji">🌙</span>睡前</a>
      <a href="library.html?category=fairy" class="category-tag"><span class="emoji">🏰</span>童话</a>
      <a href="library.html?category=fable" class="category-tag"><span class="emoji">🦊</span>寓言</a>
      <a href="library.html?category=idiom" class="category-tag"><span class="emoji">📖</span>成语</a>
    </div>

    <!-- Child Badge -->
    <a href="profile.html" class="child-badge" id="childBadge" style="display:none">
      <span class="avatar" id="childEmoji">👶</span>
      <span id="childName">添加宝贝</span>
    </a>

    <div class="no-child-tip" id="no-child-tip">
      还没有添加宝贝哦～<a href="profile.html">去添加</a>，让故事更有趣！
    </div>

    <!-- Feature Grid -->
    <div class="feature-grid">
      <a href="library.html" class="feature-card">
        <span class="icon">📚</span>
        <h3>故事库</h3>
        <p>格林童话·安徒生·伊索寓言</p>
      </a>
      <a href="create.html" class="feature-card">
        <span class="icon">✨</span>
        <h3>AI故事</h3>
        <p>以宝贝为主角的专属故事</p>
      </a>
      <div class="feature-card coming-soon">
        <span class="icon">🎨</span>
        <h3>AI绘本</h3>
        <p>精美绘本故事（即将上线）</p>
      </div>
      <div class="feature-card coming-soon">
        <span class="icon">🎙️</span>
        <h3>声音工坊</h3>
        <p>爸妈的声音讲故事（即将上线）</p>
      </div>
    </div>

    <!-- 今日推荐 -->
    <div class="section-title">⭐ 今日推荐</div>
    <div id="recommendList"></div>

    <!-- 最近听过 -->
    <div class="section-title">🕐 最近听过</div>
    <div id="recentList"></div>
  </div>

  <nav class="nav-bar">
    <a href="index.html" class="active"><span class="icon">🏠</span>首页</a>
    <a href="library.html"><span class="icon">📚</span>故事库</a>
    <a href="create.html"><span class="icon">✨</span>AI创作</a>
    <a href="profile.html"><span class="icon">👤</span>我的</a>
  </nav>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/story-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Update child badge
    const child = ChildStore.getDefault();
    if (child) {
      document.getElementById('childBadge').style.display = 'inline-flex';
      document.getElementById('childEmoji').textContent = getGenderEmoji(child.gender);
      document.getElementById('childName').textContent = child.name;
      document.getElementById('no-child-tip').style.display = 'none';
    }

    // Render recommendations
    (function() {
      const list = document.getElementById('recommendList');
      const stories = StoryData.getRandom(3);
      list.innerHTML = stories.map(s => `
        <a href="reader.html?id=${s.id}&source=library" class="story-card">
          <div class="thumb">${s.emoji}</div>
          <div class="info">
            <h4>${s.title}</h4>
            <p>${s.category === 'bedtime' ? '睡前故事' : s.category === 'fairy' ? '童话故事' : s.category === 'fable' ? '寓言故事' : '成语故事'} · ${s.ageRange}岁</p>
          </div>
          <span class="arrow">›</span>
        </a>
      `).join('');
    })();

    // Render recent
    (function() {
      const list = document.getElementById('recentList');
      const history = StoryStore.getHistory().slice(0, 3);
      if (history.length === 0) {
        list.innerHTML = '<div style="color:rgba(255,255,255,0.6);text-align:center;padding:20px;">还没有听过故事哦～</div>';
        return;
      }
      list.innerHTML = history.map(h => {
        const story = StoryData.getById(h.originalId);
        if (!story) return '';
        return `
          <a href="reader.html?id=${story.id}&source=library" class="story-card">
            <div class="thumb">${story.emoji}</div>
            <div class="info">
              <h4>${story.title}</h4>
              <p>${formatDate(h.timestamp)}</p>
            </div>
            <span class="arrow">›</span>
          </a>
        `;
      }).join('');
    })();
  </script>
</body>
</html>
