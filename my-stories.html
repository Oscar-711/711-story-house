<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>我的AI故事 - 711故事屋</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      color: #fff;
    }
    
    .back-btn {
      font-size: 24px;
      text-decoration: none;
      color: #fff;
      padding: 8px;
    }
    
    .page-header h1 {
      font-size: 20px;
      font-weight: 700;
    }
    
    .create-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      border-radius: 16px;
      padding: 16px;
      margin: 0 20px 20px;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(255,107,107,0.3);
      transition: all 0.3s;
    }
    
    .create-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,107,107,0.4);
    }
    
    .story-list {
      padding: 0 20px 100px;
    }
    
    .story-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-decoration: none;
      color: #1a1a2e;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.3);
      position: relative;
    }
    
    .story-card:hover {
      transform: translateX(4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    
    .story-emoji {
      font-size: 44px;
      min-width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
      border-radius: 16px;
    }
    
    .story-info {
      flex: 1;
    }
    
    .story-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .story-meta {
      font-size: 13px;
      color: #636e72;
    }
    
    .story-arrow {
      font-size: 20px;
      color: #b2bec3;
    }
    
    .ai-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 11px;
      padding: 4px 10px;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      border-radius: 12px;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 100px 20px;
      color: rgba(255,255,255,0.7);
    }
    
    .empty-emoji {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    
    .empty-state p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 24px;
    }
    
    .btn-outline {
      display: inline-block;
      padding: 12px 24px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 24px;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      transition: all 0.3s;
    }
    
    .btn-outline:hover {
      background: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <a href="profile.html" class="back-btn">←</a>
      <h1>✨ 我的AI故事</h1>
    </div>
    
    <a href="create.html" class="create-btn">
      <span>✨</span> 创作新故事
    </a>
    
    <div class="story-list" id="storyList"></div>
    
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-emoji">✨</div>
      <h3>还没有AI故事</h3>
      <p>用AI为宝贝创作专属故事，<br>让宝贝成为故事的主角</p>
      <a href="create.html" class="btn-outline">创作第一个故事</a>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script>
    function render() {
      // 获取AI生成的故事（没有originalId的就是AI生成的）
      const aiStories = StoryStore.getAll().filter(s => !s.originalId);
      const list = document.getElementById('storyList');
      const empty = document.getElementById('emptyState');
      
      if (aiStories.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      
      empty.style.display = 'none';
      
      // 按创建时间倒序
      aiStories.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      
      list.innerHTML = aiStories.map(s => `
        <a href="reader.html?storyId=${s.id}&source=ai" class="story-card">
          <span class="ai-badge">AI</span>
          <div class="story-emoji">${s.emoji || '✨'}</div>
          <div class="story-info">
            <div class="story-title">${s.title || '未命名故事'}</div>
            <div class="story-meta">创作于 ${formatDate(s.createdAt)} · ${s.childName || '未知宝贝'}</div>
          </div>
          <span class="story-arrow">›</span>
        </a>
      `).join('');
    }
    
    render();
  </script>
</body>
</html>
