<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>故事库 - 711故事屋</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .filter-bar { padding: 16px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-btn { white-space: nowrap; padding: 8px 16px; border-radius: 20px; border: 2px solid #e0e0e0; background: #fff; font-size: 14px; cursor: pointer; transition: all .3s; }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .age-filter { display: flex; gap: 8px; margin-bottom: 12px; }
    .age-btn { padding: 6px 12px; border-radius: 16px; border: 1px solid #ddd; background: #fff; font-size: 12px; cursor: pointer; }
    .age-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .search-box { width: 100%; padding: 10px 16px; border: 2px solid #e8e0ff; border-radius: 12px; font-size: 14px; box-sizing: border-box; }
    .story-list { padding: 0 16px 100px; }
    .story-card { display: flex; gap: 16px; background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.04); cursor: pointer; transition: transform .2s; }
    .story-card:active { transform: scale(.98); }
    .story-emoji { font-size: 40px; min-width: 50px; display: flex; align-items: center; justify-content: center; }
    .story-info { flex: 1; }
    .story-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 4px; }
    .story-desc { font-size: 13px; color: #999; line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .story-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .story-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f0f0f0; color: #666; }
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header"><h1>📚 故事库</h1></div>

    <div class="filter-bar">
      <div class="category-tabs">
        <button class="tab-btn active" data-cat="all">全部</button>
        <button class="tab-btn" data-cat="grimm">📚 格林童话</button>
        <button class="tab-btn" data-cat="andersen">🦢 安徒生童话</button>
        <button class="tab-btn" data-cat="aesop">📖 伊索寓言</button>
        <button class="tab-btn" data-cat="classic">⭐ 经典故事</button>
      </div>
      <div class="age-filter">
        <button class="age-btn active" data-age="all">全部</button>
        <button class="age-btn" data-age="2-4">2-4岁</button>
        <button class="age-btn" data-age="4-6">4-6岁</button>
        <button class="age-btn" data-age="6-8">6-8岁</button>
      </div>
      <input class="search-box" type="text" placeholder="🔍 搜索故事..." id="searchInput">
    </div>

    <div class="story-list" id="storyList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-emoji">🔍</div>
      <p>没有找到故事</p>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.html"><span class="icon">🏠</span>首页</a>
    <a href="library.html" class="active"><span class="icon">📚</span>故事库</a>
    <a href="create.html"><span class="icon">✨</span>AI创作</a>
    <a href="profile.html"><span class="icon">👤</span>我的</a>
  </nav>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/story-data.js"></script>
  <script>
    let allStories = StoryData.stories;
    let currentCat = 'all';
    let currentAge = 'all';
    let searchText = '';

    function renderStories() {
      let filtered = allStories;
      if (currentCat !== 'all') filtered = filtered.filter(s => s.category === currentCat);
      if (currentAge !== 'all') filtered = filtered.filter(s => s.ageRange === currentAge);
      if (searchText) filtered = filtered.filter(s => s.title.includes(searchText) || (s.content && s.content.includes(searchText)));

      const list = document.getElementById('storyList');
      const empty = document.getElementById('emptyState');

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      list.innerHTML = filtered.map(s => `
        <div class="story-card" onclick="openStory('${s.id}','library')">
          <div class="story-emoji">${s.emoji || '📖'}</div>
          <div class="story-info">
            <div class="story-title">${s.title}</div>
            <div class="story-desc">${(s.content || '').substring(0, 50)}...</div>
            <div class="story-tags">
              <span class="story-tag">${s.ageRange}岁</span>
              ${(s.tags || []).slice(0, 2).map(t => `<span class="story-tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    function openStory(id, source) {
      window.location.href = `reader.html?id=${id}&source=${source}`;
    }

    // 初始化渲染
    renderStories();

    // 分类切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCat = this.dataset.cat;
        renderStories();
      });
    });

    // 年龄切换
    document.querySelectorAll('.age-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentAge = this.dataset.age;
        renderStories();
      });
    });

    // 搜索
    document.getElementById('searchInput').addEventListener('input', function() {
      searchText = this.value.trim();
      renderStories();
    });
  </script>
</body>
</html>
